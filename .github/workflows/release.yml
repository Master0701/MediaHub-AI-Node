name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Tests
        run: |
          ruff check .
          python -m pytest

      - name: Quellpaket erstellen
        run: |
          mkdir -p release
          VERSION="${GITHUB_REF_NAME}"
          zip -r "release/MediaHub-AI-Node_${VERSION}_Source.zip" . \
            -x ".git/*" "release/*" "backups/*" ".env" "*.db" "*.sqlite*"
          sha256sum release/*.zip > "release/MediaHub-AI-Node_${VERSION}.sha256"

      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/*.zip
            release/*.sha256
