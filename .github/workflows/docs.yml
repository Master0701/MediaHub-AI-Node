name: Dokumentation

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "README.md"
      - "scripts/build_documentation.sh"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: Pandoc installieren
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: HTML-Dokumentation erstellen
        run: |
          mkdir -p docs/generated
          pandoc docs/HANDBOOK.md \
            --standalone \
            --metadata title="MediaHub-AI-Node Handbuch" \
            -o docs/generated/MediaHub-AI-Node_Handbuch.html

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v7
        with:
          name: MediaHub-AI-Node-Dokumentation
          path: docs/generated/
